name: "🚀 Release"

on:
  release:
    types:
      - published

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Parse version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download release asset and compute checksum
        run: |
          ASSET_NAME="Jellyfin.Plugin.SyncPlayChat_${{ steps.version.outputs.version }}.zip"
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "${ASSET_NAME}" \
            --dir /tmp
          MD5=$(md5sum "/tmp/${ASSET_NAME}" | awk '{print $1}')
          echo "checksum=${MD5}" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            const version = '${{ steps.version.outputs.version }}';
            const checksum = process.env.checksum;
            const body = context.payload.release.body || '';
            const changelog = body.replace(/\r\n/g, ' ').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
            const now = new Date().toISOString().replace(/\.\d{3}Z$/, '');
            const sourceUrl = `https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/Jellyfin.Plugin.SyncPlayChat_${version}.zip`;

            const newEntry = {
              changelog,
              targetAbi: '10.11.0.0',
              version,
              sourceUrl,
              checksum,
              timestamp: now
            };

            manifest[0].versions.unshift(newEntry);
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 4) + '\n');

      - name: Update Directory.Build.props
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" Directory.Build.props
          sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${VERSION}</AssemblyVersion>|" Directory.Build.props
          sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>${VERSION}</FileVersion>|" Directory.Build.props

      - name: Commit and push
        run: |
          git config user.name "[Bot] Abhay V Ashokan"
          git config user.email "abhayvashokan@gmail.com"
          git add manifest.json Directory.Build.props
          git commit -m "release: update manifest and version to ${{ steps.version.outputs.version }}"
          git push
